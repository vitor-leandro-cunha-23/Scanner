<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GabaritoScan</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#07090f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { 
      margin: 0; 
      background: #07090f; 
      color: #dde6f0;
      overflow-x: hidden; 
      touch-action: manipulation;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    button { user-select: none; -webkit-tap-highlight-color: transparent; transition: opacity 0.2s; }
    button:active { opacity: 0.7; }
    select, input { -webkit-appearance: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Error:', err));
      });
    }
  </script>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback, useMemo } = React;

    const C = {
      bg:"#07090f", card:"#0f1520", card2:"#151d2e",
      border:"#1c2840", accent:"#22d3a0", purple:"#8b5cf6",
      warn:"#f59e0b", danger:"#f43f5e", text:"#dde6f0", muted:"#4f6280",
      success:"#10b981",
    };

    function useStorage(key, init) {
      const [val, setVal] = useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : init;
        } catch { return init; }
      });
      const save = useCallback((v) => {
        setVal(v);
        window.localStorage.setItem(key, JSON.stringify(v));
      }, [key]);
      return [val, save];
    }

    /* ════════════════════════════════════════════════════════════════ */
    function App() {
      const [tab, setTab] = useState("provas");
      const [exams, setExams] = useStorage("gs_exams_v5", []);
      const [history, setHistory] = useStorage("gs_history_v5", []);

      const exportBackup = () => {
        const data = JSON.stringify({ exams, history, date: new Date().toISOString() });
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `gabaritoscan_backup_${new Date().toLocaleDateString().replace(/\//g,'-')}.json`;
        a.click();
      };

      const tabs = [
        { id:"provas",   icon:"📚", label:"Provas"    },
        { id:"escanear", icon:"📷", label:"Escanear"  },
        { id:"historico",icon:"📊", label:"Histórico" },
      ];

      return (
        <div style={{ minHeight:"100vh", maxWidth:520, margin:"0 auto", paddingBottom:80 }}>
          <div style={{ position:"fixed", inset:0, zIndex:0, pointerEvents:"none",
            backgroundImage:`radial-gradient(circle, ${C.border} 1px, transparent 1px)`,
            backgroundSize:"28px 28px" }} />

          <div style={{ position:"relative", zIndex:1, padding:"0 16px" }}>
            {/* Header */}
            <div style={{ padding:"18px 0 6px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ width:40, height:40, borderRadius:12,
                  background:"linear-gradient(135deg,#22d3a0,#8b5cf6)",
                  display:"flex", alignItems:"center", justifyContent:"center", fontSize:22 }}>📋</div>
                <div>
                  <div style={{ fontSize:18, fontWeight:900, background:"linear-gradient(135deg,#22d3a0,#8b5cf6)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>
                    GabaritoScan
                  </div>
                  <div style={{ fontSize:11, color:C.muted }}>Correção Gratuita via Gemini</div>
                </div>
              </div>
              <button onClick={exportBackup} style={{ background:C.card2, border:`1px solid ${C.border}`, borderRadius:8, padding:"6px 10px", color:C.text, cursor:"pointer" }}>💾</button>
            </div>

            <div style={{ paddingTop:12 }}>
              {tab==="provas"    && <ProvasTab   exams={exams} setExams={setExams} />}
              {tab==="escanear"  && <EscanearTab exams={exams} history={history} setHistory={setHistory} />}
              {tab==="historico" && <HistoricoTab history={history} setHistory={setHistory} />}
            </div>
          </div>

          {/* Bottom Nav */}
          <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:520, background:C.card, borderTop:`1px solid ${C.border}`, display:"flex", padding:"6px 8px 12px", gap:4, zIndex:50 }}>
            {tabs.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                style={{ flex:1, border:"none", cursor:"pointer", borderRadius:12, padding:"8px 4px", background: tab===t.id ? "rgba(34,211,160,0.12)" : "transparent", color: tab===t.id ? C.accent : C.muted, display:"flex", flexDirection:"column", alignItems:"center", gap:3 }}>
                <span style={{ fontSize:20 }}>{t.icon}</span>
                <span style={{ fontSize:11, fontWeight: tab===t.id ? 800 : 500 }}>{t.label}</span>
              </button>
            ))}
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════════════════════════ */
    function ProvasTab({ exams, setExams }) {
      const [mode, setMode] = useState("list");
      const [editing, setEditing] = useState(null);

      if (mode==="new") return <ExamForm onSave={e=>{setExams([...exams,e]);setMode("list");}} onCancel={()=>setMode("list")} />;
      if (mode==="edit") return <ExamForm initial={editing} onSave={e=>{setExams(exams.map(x=>x.id===e.id?e:x));setMode("list");}} onCancel={()=>setMode("list")} />;

      return (
        <div>
          <Row>
            <PageTitle title="Provas" sub={`${exams.length} gabaritos configurados`} />
            <Chip onClick={()=>setMode("new")} color={C.accent}>+ Nova</Chip>
          </Row>
          {exams.length===0 ? <Empty icon="📋" text="Crie um gabarito para começar." /> : 
            exams.map(e=>(
              <div key={e.id} style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:14, padding:14, marginBottom:10, display:"flex", alignItems:"center", gap:12 }}>
                <div style={{ width:45, height:45, borderRadius:10, background:C.card2, border:`1px solid ${C.border}`, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:900, color:C.accent }}>{e.numQ}Q</div>
                <div style={{ flex:1 }}><div style={{ fontWeight:700 }}>{e.name}</div><div style={{ fontSize:12, color:C.muted }}>{e.createdAt}</div></div>
                <div style={{ display:"flex", gap:6 }}>
                  <IconBtn onClick={()=>{setEditing(e);setMode("edit");}}>✏️</IconBtn>
                  <IconBtn color="danger" onClick={()=>{if(confirm("Excluir prova?")) setExams(exams.filter(x=>x.id!==e.id))}}>🗑️</IconBtn>
                </div>
              </div>
            ))
          }
        </div>
      );
    }

    function ExamForm({ initial, onSave, onCancel }) {
      const [name, setName] = useState(initial?.name||"");
      const [numQ, setNumQ] = useState(initial?.numQ||10);
      const [answers, setAnswers] = useState(initial?.answers||Array(10).fill(""));

      useEffect(() => {
        setAnswers(prev => {
          const a = [...prev];
          while(a.length < numQ) a.push("");
          return a.slice(0, numQ);
        });
      }, [numQ]);

      return (
        <div>
          <Row><PageTitle title="Gabarito" sub="Configure as respostas" /><Chip onClick={onCancel} color={C.muted}>Voltar</Chip></Row>
          <div style={{ background:C.card, padding:16, borderRadius:14, marginBottom:14 }}>
            <FieldLabel>Nome da Atividade</FieldLabel>
            <SInput value={name} onChange={e=>setName(e.target.value)} placeholder="Ex: Avaliação de Português" />
            <FieldLabel>Total de Questões</FieldLabel>
            <SInput type="number" value={numQ} onChange={e=>setNumQ(Number(e.target.value))} />
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:8, marginBottom:14 }}>
            {answers.map((v,i)=>(
              <div key={i} style={{ background:C.card, borderRadius:10, padding:8, textAlign:"center", border:`1px solid ${v?C.accent:C.border}` }}>
                <div style={{ fontSize:10, color:C.muted }}>Q{i+1}</div>
                <select value={v} onChange={e=>{const a=[...answers];a[i]=e.target.value;setAnswers(a)}} style={{ background:"transparent", border:"none", color:C.text, fontWeight:800, fontSize:14, outline:"none", width:"100%" }}>
                  {["","A","B","C","D","E"].map(o=><option key={o} value={o}>{o||"-"}</option>)}
                </select>
              </div>
            ))}
          </div>
          <button onClick={()=>{if(!name)return alert("Nome vazio"); onSave({id:initial?.id||Date.now(), name, numQ, answers, createdAt:new Date().toLocaleDateString()})}} style={{ width:"100%", padding:16, borderRadius:14, background:C.accent, color:"#000", fontWeight:900, border:"none" }}>SALVAR GABARITO</button>
        </div>
      );
    }

    /* ════════════════════════════════════════════════════════════════ */
    function EscanearTab({ exams, history, setHistory }) {
      const [examId, setExamId] = useState("");
      const [student, setStudent] = useState("");
      const [phase, setPhase] = useState("idle");
      const [imgSrc, setImgSrc] = useState(null);
      const [result, setResult] = useState(null);
      const [errMsg, setErrMsg] = useState("");
      const camRef = useRef(null);

      const analyze = async (dataUrl) => {
        setPhase("processing"); setErrMsg("");
        const exam = exams.find(e=>String(e.id)===String(examId));
        const base64 = dataUrl.split(",")[1];
        
        const sys = `Retorne JSON estrito: {"respostas":["A","B",...],"confianca":"alta"}. Analise as ${exam.numQ} questões do gabarito. Use "?" para branco/ilegível.`;

        try {
          const KEY = "AIzaSyDhiDgjEXZUDWo4qafc_jPJj-PzIJL5Tms"; // <--- COLOQUE SUA CHAVE DO GEMINI AQUI
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
              system_instruction: { parts: [{ text: sys }] },
              contents: [{ parts: [{ text: "Leia este gabarito." }, { inline_data: { mime_type: "image/jpeg", data: base64 } }] }],
              generationConfig: { response_mime_type: "application/json" }
            })
          });
          
          const data = await res.json();
          const parsed = JSON.parse(data.candidates[0].content.parts[0].text);
          
          let correct=0;
          const details = exam.answers.map((ca, i) => {
            const s = (parsed.respostas[i]||"?").toUpperCase();
            if(s === ca && ca !== "") correct++;
            return { q:i+1, s, c:ca, ok: s===ca && ca!=="" };
          });

          const pct = Math.round((correct / exam.numQ) * 100);
          const final = { id:Date.now(), examName:exam.name, student:student||"Aluno", correct, total:exam.numQ, pct, details, date:new Date().toLocaleDateString() };
          
          setHistory([final, ...history]);
          setResult(final);
          setPhase("result");
        } catch(e) { 
          setErrMsg("Erro na leitura. Verifique a chave da API e a conexão."); 
          setPhase("idle"); 
        }
      };

      const handleFile = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => { setImgSrc(ev.target.result); analyze(ev.target.result); };
        reader.readAsDataURL(file);
      };

      return (
        <div>
          <PageTitle title="Escanear" sub="Análise automática por IA" />
          <div style={{ background:C.card, padding:16, borderRadius:14, marginBottom:14 }}>
            <FieldLabel>Prova Base</FieldLabel>
            <SSelect value={examId} onChange={e=>setExamId(e.target.value)}>
              <option value="">Selecione...</option>
              {exams.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
            </SSelect>
            <FieldLabel>Nome do Aluno</FieldLabel>
            <SInput value={student} onChange={e=>setStudent(e.target.value)} placeholder="Opcional" />
          </div>

          {phase === "processing" ? <div style={{ textAlign:"center", padding:40 }}><Spinner /><div style={{ marginTop:10, color:C.muted }}>Processando imagem...</div></div> : 
           phase === "result" ? <ResultCard result={result} onReset={()=>setPhase("idle")} /> : 
           <div>
             <button onClick={()=>examId ? camRef.current.click() : alert("Escolha a prova")} style={{ width:"100%", padding:20, borderRadius:14, background:C.accent, color:"#000", fontWeight:900, border:"none", fontSize:16 }}>📷 TIRAR FOTO DO GABARITO</button>
             <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={handleFile} />
             {errMsg && <div style={{ color:C.danger, textAlign:"center", marginTop:10, fontSize:13 }}>{errMsg}</div>}
           </div>
          }
        </div>
      );
    }

    function ResultCard({ result, onReset }) {
      return (
        <div style={{ background:C.card, padding:20, borderRadius:16, border:`1px solid ${C.accent}44` }}>
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:12, color:C.muted }}>{result.student}</div>
            <div style={{ fontSize:50, fontWeight:900, color:result.pct >= 60 ? C.success : C.danger }}>{result.pct}%</div>
            <div style={{ marginBottom:15 }}>{result.correct} de {result.total} acertos</div>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:6, marginBottom:20 }}>
            {result.details.map(d=>(
              <div key={d.q} style={{ background:C.bg, padding:6, borderRadius:8, textAlign:"center", border:`1px solid ${d.ok ? C.success : C.danger}` }}>
                <div style={{ fontSize:9, color:C.muted }}>Q{d.q}</div>
                <div style={{ fontWeight:900, color:d.ok ? C.success : C.danger }}>{d.s}</div>
              </div>
            ))}
          </div>
          <button onClick={onReset} style={{ width:"100%", padding:12, borderRadius:10, background:C.card2, color:C.text, border:`1px solid ${C.border}` }}>Nova Leitura</button>
        </div>
      );
    }

    /* ════════════════════════════════════════════════════════════════ */
    function HistoricoTab({ history, setHistory }) {
      // Ordenação Alfabética Automática
      const sorted = useMemo(() => {
        return [...history].sort((a,b) => a.student.localeCompare(b.student));
      }, [history]);

      if (!history.length) return <Empty icon="📊" text="Histórico vazio." />;

      return (
        <div>
          <Row><PageTitle title="Histórico" sub="Alunos em ordem alfabética" /><Chip onClick={()=>{if(confirm("Limpar tudo?"))setHistory([])}} color={C.danger}>Limpar</Chip></Row>
          {sorted.map(h=>(
            <div key={h.id} style={{ background:C.card, padding:14, borderRadius:14, marginBottom:8, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <div style={{ fontWeight:700 }}>{h.student}</div>
                <div style={{ fontSize:12, color:C.muted }}>{h.examName} • {h.date}</div>
              </div>
              <div style={{ fontWeight:900, color: h.pct >= 60 ? C.success : C.danger }}>{h.pct}%</div>
            </div>
          ))}
        </div>
      );
    }

    /* Micro-components */
    function PageTitle({title,sub}) { return <div><div style={{fontSize:22, fontWeight:900}}>{title}</div><div style={{fontSize:12, color:C.muted, marginBottom:10}}>{sub}</div></div> }
    function Row({children}) { return <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:15}}>{children}</div> }
    function Chip({children, onClick, color}) { return <button onClick={onClick} style={{padding:"6px 12px", borderRadius:20, background:`${color}22`, color, border:`1px solid ${color}44`, fontWeight:700, fontSize:12}}>{children}</button> }
    function FieldLabel({children}) { return <div style={{fontSize:11, fontWeight:700, color:C.muted, marginBottom:5, textTransform:"uppercase"}}>{children}</div> }
    function SInput(props) { return <input {...props} style={{width:"100%", padding:12, background:C.bg, border:`1px solid ${C.border}`, borderRadius:10, color:C.text, marginBottom:15}} /> }
    function SSelect(props) { return <select {...props} style={{width:"100%", padding:12, background:C.bg, border:`1px solid ${C.border}`, borderRadius:10, color:C.text, marginBottom:15}} /> }
    function IconBtn({children, onClick, color}) { return <button onClick={onClick} style={{width:35, height:35, borderRadius:8, background:C.card2, border:`1px solid ${color==='danger'?C.danger:C.border}`, color:color==='danger'?C.danger:C.text, cursor:"pointer"}}>{children}</button> }
    function Empty({icon, text}) { return <div style={{textAlign:"center", padding:50, color:C.muted}}><div style={{fontSize:40}}>{icon}</div><div>{text}</div></div> }
    function Spinner() { return <div style={{width:30, height:30, border:`3px solid ${C.border}`, borderTopColor:C.accent, borderRadius:"50%", animation:"spin 1s linear infinite", margin:"0 auto"}} /><style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style> }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
